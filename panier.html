<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizons Electrical | Votre Panier</title>
    <link rel="stylesheet" href="CSS/style.css">
    <style>
        .panier-item { display: flex; justify-content: space-between; background: var(--surface-dark); padding: 15px 20px; border-radius: 8px; margin-bottom: 15px; border-left: 3px solid var(--electric-blue); }
        .vide-msg { text-align: center; color: var(--text-muted); padding: 4px 0; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <header>
        <a href="index.html" class="logo">HORIZONS ELECTRICAL</a>
        <nav class="nav-links">
            <a href="index.html">Accueil</a>
            <a href="produits.html">Matériels</a>
            <a href="panier.html">🛒 Panier (<span id="panier-count">0</span>)</a>
        </nav>
    </header>

    <main class="container">
        <h2>Votre Sélection Technique</h2>
        <div id="liste-panier" style="margin-top: 30px;">
            <!-- Rempli automatiquement par le JavaScript -->
        </div>

        <div id="actions-panier" style="margin-top: 30px; display: none;">
            <button class="btn btn-solar" onclick="envoyerCommandeWhatsApp()" style="font-size: 1.1rem; padding: 15px;">🚀 Commander via WhatsApp (Demander un P.U / Devis)</button>
            <button class="btn" onclick="viderLePanier()" style="background: rgba(255, 0, 0, 0.2); color: #ff4a4a; margin-top: 10px;">Vider le panier</button>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        function afficherPanier() {
            const liste = document.getElementById('liste-panier');
            const actions = document.getElementById('actions-panier');
            liste.innerHTML = '';

            if (panier.length === 0) {
                liste.innerHTML = '<p class="vide-msg">Votre panier est vide pour le moment. Explorez nos équipements matériels !</p>';
                actions.style.display = 'none';
                return;
            }

            actions.style.display = 'block';
            panier.forEach(item => {
                let div = document.createElement('div');
                div.className = 'panier-item';
                div.innerHTML = `
                    <div>
                        <strong>${item.nom}</strong> <br>
                        <span style="color: var(--text-muted)">Quantité : ${item.quantite}</span>
                    </div>
                    <div style="color: var(--solar-gold); font-weight: bold;">${item.prix}</div>
                `;
                liste.appendChild(div);
            });
        }

        function viderLePanier() {
            panier = [];
            sauvegarderPanier();
            majCompteurPanier();
            afficherPanier();
        }

        function envoyerCommandeWhatsApp() {
            let numero = "243976832383"; // Votre numéro professionnel
            let message = "Bonjour Horizons Electrical, je souhaite recevoir un devis détaillé pour le matériel suivant :\n\n";
            
            panier.forEach(item => {
                message += `- ${item.nom} (Quantité : ${item.quantite})\n`;
            });
            
            message += "\nMerci de me recontacter avec les Prix Unitaires (P.U).";
            
            // Ouvrir l'API WhatsApp
            let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(message);
            window.open(url, '_blank');
        }

        // Afficher le panier au chargement de cette page spécifique
        document.addEventListener('DOMContentLoaded', afficherPanier);
    </script>
</body>
</html>
